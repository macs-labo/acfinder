name: ACFinderBE Global Deploy

on:
  push:
    paths:
      - 'acfinder[0-9]*.zip' # acfinder2026.0306.1200.zip 等の追加で発動
  workflow_dispatch:
    inputs:
      run_mode:
        description: '実行モード'
        type: choice
        options:
          - 'full_deploy'  # ZIP展開 ＋ リポジトリ更新 ＋ サーバー同期
          - 'deploy_only'  # ZIP展開 ＋ リポジトリ更新のみ
          - 'sync_only'    # サーバー同期のみ
        default: 'full_deploy'
      force_update:
        description: '実験室を強制更新（?update=1）しますか？'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- STEP 1: リポジトリの更新 ---
      - name: Process ZIP and Update Repository
        # Push時、または手動で full_deploy か deploy_only を選択した時のみ実行
        if: |
          github.event_name == 'push' || 
          github.event.inputs.run_mode == 'full_deploy' || 
          github.event.inputs.run_mode == 'deploy_only'
        run: |
          # アルファベット順で一番最後（最新日付）のZIPを特定
          TARGET_ZIP=$(ls -1 acfinder[0-9]*.zip | tail -n 1)
          
          if [ -z "$TARGET_ZIP" ]; then
            echo "Error: ZIP file not found!"
            exit 1
          fi

          echo "Latest ZIP found: $TARGET_ZIP"
          
          # ZIPを解凍してリポジトリを展開
          unzip -o "$TARGET_ZIP" -d ./
          
          # GitHubにコミット
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --cached --quiet || git commit -m "Auto deploy from $TARGET_ZIP [skip ci]"
          git push

      - name: Upload GitHub Pages artifact
        if: |
          github.event_name == 'push' ||
          github.event.inputs.run_mode == 'full_deploy' ||
          github.event.inputs.run_mode == 'deploy_only'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy-pages:
    needs: build
    # Push時、または手動で full_deploy か deploy_only を選択した時のみ実行
    if: |
      github.event_name == 'push' ||
      github.event.inputs.run_mode == 'full_deploy' ||
      github.event.inputs.run_mode == 'deploy_only'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  sync-external:
    needs: build
    # Push時、または手動で full_deploy か sync_only を選択した時のみ実行
    if: |
      github.event_name == 'push' ||
      github.event.inputs.run_mode == 'full_deploy' ||
      github.event.inputs.run_mode == 'sync_only'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Remote Sync
        run: |
          # GitHub CDN の反映待ち
          # push 時、または run_mode が 'full_deploy' の場合のみ待機
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.run_mode }}" == "full_deploy" ]]; then
            echo "Waiting 120 seconds for GitHub to reflect changes..."
            sleep 120
          fi

          # 強制更新オプションの判定
          OPT=""
          if [ "${{ github.event.inputs.force_update }}" == "true" ]; then
            OPT="?update=1"
          fi

          echo "Triggering sync with option: $OPT"

          CURL_OPTS=(
            -s 
            -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" 
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}"
          )

          # 各拠点を叩く
          curl -s -u "${{ secrets.SYNC_USER }}:${{ secrets.SYNC_PASS }}" -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://macs.xii.jp/acfinder/.sync.acfinder.php$OPT"
          curl "${CURL_OPTS[@]}" "https://macs.kabe.info/acfinder/.sync.acfinder.php$OPT"
          curl "${CURL_OPTS[@]}" "https://noyaku.ebb.jp/acfinder/.sync.acfinder.php$OPT"
          curl "${CURL_OPTS[@]}" "https://macs.coresv.net/acfinder/.sync.acfinder.php$OPT"
